name: notes_app
description: A beautiful notes app built with Flutter and Supabase
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2 # Hubi kani inuu ku jiro
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.2.1
  flutter_signin_button: ^2.0.0
  intl: ^0.19.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  lottie: ^3.1.0
  iconsax: ^0.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
